<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
</head>
<body>

<h2>Login</h2>
<input id="username" placeholder="username">
<input id="password" placeholder="password">
<button onclick="login()">Login</button>

<h2>Chat</h2>
<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

<script>
let currentUser = "";
let otherUser = "";
let intervalStarted = false;

function login() {
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    fetch(`http://chat-app-production-921e.up.railway.app/api/login?username=${u}&password=${p}`, {
        method: "POST"
    })
    .then(res => res.text())
    .then(data => {
        if(data === "SUCCESS") {
            alert("Login success");
            currentUser = u;
            otherUser = (u === "user1") ? "user2" : "user1";
            loadMessages();
           if(!intervalStarted){
                setInterval(loadMessages, 2000);
                intervalStarted = true;
            }
        } else {
            alert("Login failed");
        }
    });
}

function send() {
    let message = document.getElementById("msg").value;
    if(!message) return;

    fetch(`http://chat-app-production-921e.up.railway.app/api/send?sender=${currentUser}&receiver=${otherUser}&content=${message}`, {
        method: "POST"
    }).then(() => {
        document.getElementById("msg").value = "";
        loadMessages();
    });
}

function loadMessages() {
    if(!currentUser || !otherUser) return;

    fetch(`http://chat-app-production-921e.up.railway.app/api/messages?u1=${currentUser}&u2=${otherUser}`)
    .then(res => res.json())
    .then(data => {
        if(!Array.isArray(data)) {
            console.error("API error:", data);
            return;
        }
        let chat = document.getElementById("chat");
        chat.innerHTML = "";
        data.forEach(m => {
            chat.innerHTML += `<p><b>${m.sender}:</b> ${m.content}</p>`;
        });
    })
    .catch(err => console.error("Fetch error:", err));
}
</script>

</body>
</html>
